s="pub-stat-label">执行中</span></div><div class="pub-stat"><span class="pub-stat-dot pending"></span><span class="pub-stat-num" id="cnt-pending">5</span><span class="pub-stat-label">待执行</span></div><div class="pub-stat"><span class="pub-stat-dot completed"></span><span class="pub-stat-num" id="cnt-done">24</span><span class="pub-stat-label">已完成</span></div><div class="pub-stat"><span class="pub-stat-dot failed"></span><span class="pub-stat-num" id="cnt-fail">1</span><span class="pub-stat-label">失败</span></div></div><div class="pub-tabs" id="pubTabs"><button class="pub-tab active" data-filter="all">全部任务</button> <button class="pub-tab" data-filter="running">执行中</button> <button class="pub-tab" data-filter="pending">待执行</button> <button class="pub-tab" data-filter="completed">已完成</button> <button class="pub-tab" data-filter="failed">失败</button></div><div class="pub-table-wrap"><table class="pub-table"><thead><tr><th>账号 ID</th><th>所属平台</th><th>发布内容</th><th>计划时间</th><th>发布进度</th><th>状态</th><th>操作</th></tr></thead><tbody id="taskTableBody"></tbody></table></div><div class="pub-modal-overlay" id="modalOverlay"><div class="pub-modal"><div class="pub-modal-header"><h2 class="pub-modal-title">新建发布任务</h2><button class="pub-modal-close" id="modalClose">✕</button></div><div class="pub-modal-body"><div class="pub-form-row"><label class="pub-label">任务名称</label> <input class="pub-input" type="text" placeholder="例：小红书春季推广 - 第1批"></div><div class="pub-form-row"><label class="pub-label">目标平台</label><div class="pub-platform-checks"><label class="pub-check"><input type="checkbox" value="xhs"> 小红书</label> <label class="pub-check"><input type="checkbox" value="dy"> 抖音</label> <label class="pub-check"><input type="checkbox" value="gzh"> 微信公众号</label> <label class="pub-check"><input type="checkbox" value="pyq"> 微信朋友圈</label> <label class="pub-check"><input type="checkbox" value="msg"> 微信消息</label></div></div><div class="pub-form-row"><label class="pub-label">发布数量</label> <input class="pub-input pub-input-sm" type="number" placeholder="100" min="1"></div><div class="pub-form-row"><label class="pub-label">计划开始时间</label> <input class="pub-input pub-input-sm" type="datetime-local"></div><div class="pub-form-row"><label class="pub-label">内容来源</label> <select class="pub-input"><option>AI 自动生成</option><option>从素材库选取</option><option>手动上传</option></select></div><div class="pub-form-row"><label class="pub-label">发布间隔</label> <select class="pub-input pub-input-sm"><option>每5分钟</option><option>每10分钟</option><option>每30分钟</option><option>每1小时</option><option>每天</option></select></div></div><div class="pub-modal-footer"><button class="pub-btn-cancel" id="modalCancel">取消</button> <button class="pub-btn-confirm">确认创建</button></div></div></div></main></div><script>const tasks=[{id:1,account:"小红书@春日好物铺",platform:"小红书",content:"春季穿搭图文 - 第1批",time:"2026-04-18 09:00",posts_total:20,posts_done:12,status:"running"},{id:2,account:"小红书@生活美学家",platform:"小红书",content:"春季穿搭图文 - 第1批",time:"2026-04-18 09:00",posts_total:20,posts_done:8,status:"running"},{id:3,account:"小红书@潮流穿搭记",platform:"小红书",content:"春季穿搭图文 - 第1批",time:"2026-04-18 09:00",posts_total:20,posts_done:0,status:"pending"},{id:4,account:"抖音@品牌官方号",platform:"抖音",content:"短视频矩阵发布 - 4月",time:"2026-04-18 10:30",posts_total:10,posts_done:10,status:"completed"},{id:5,account:"抖音@达人矩阵01",platform:"抖音",content:"短视频矩阵发布 - 4月",time:"2026-04-18 10:30",posts_total:10,posts_done:10,status:"completed"},{id:6,account:"抖音@达人矩阵02",platform:"抖音",content:"短视频矩阵发布 - 4月",time:"2026-04-18 10:30",posts_total:10,posts_done:10,status:"completed"},{id:7,account:"公众号@伏特科技",platform:"微信公众号",content:"周报推送 - 第16期",time:"2026-04-18 08:00",posts_total:1,posts_done:1,status:"completed"},{id:8,account:"朋友圈@销售01",platform:"微信朋友圈",content:"产品种草 - 春季新品",time:"2026-04-18 12:00",posts_total:5,posts_done:3,status:"running"},{id:9,account:"朋友圈@销售02",platform:"微信朋友圈",content:"产品种草 - 春季新品",time:"2026-04-18 12:00",posts_total:5,posts_done:2,status:"running"},{id:10,account:"朋友圈@销售03",platform:"微信朋友圈",content:"产品种草 - 春季新品",time:"2026-04-18 12:00",posts_total:5,posts_done:0,status:"pending"},{id:11,account:"微信@销售01",platform:"微信消息",content:"意向客户跟进话术",time:"2026-04-18 09:30",posts_total:50,posts_done:50,status:"completed"},{id:12,account:"微信@销售02",platform:"微信消息",content:"意向客户跟进话术",time:"2026-04-18 09:30",posts_total:50,posts_done:50,status:"completed"},{id:13,account:"微信@销售03",platform:"微信消息",content:"意向客户跟进话术",time:"2026-04-18 09:30",posts_total:28,posts_done:28,status:"completed"},{id:14,account:"抖音@品牌官方号",platform:"抖音",content:"直播预热推送",time:"2026-04-17 14:00",posts_total:5,posts_done:0,status:"failed"}],statusMap={running:{label:"执行中",cls:"running"},pending:{label:"待执行",cls:"pending"},completed:{label:"已完成",cls:"completed"},failed:{label:"失败",cls:"failed"}};let currentFilter="all";function renderTable(t){const s="all"===t?tasks:tasks.filter(s=>s.status===t);document.getElementById("taskTableBody").innerHTML=s.map(t=>{const s=t.posts_total>0?Math.round(t.posts_done/t.posts_total*100):0,n=statusMap[t.status];return`<tr>\n          <td class="pub-task-name">${t.account}</td>\n          <td><span class="pub-platform-tag">${t.platform}</span></td>\n          <td class="pub-content-type">${t.content}</td>\n          <td class="pub-time">${t.time}</td>\n          <td>\n            <div class="pub-progress-wrap">\n              <div class="pub-progress-bar ${t.status}" style="width:${s}%"></div>\n            </div>\n            <span class="pub-progress-text">已发布 ${t.posts_done} 条 / 共 ${t.posts_total} 条（${s}%）</span>\n          </td>\n          <td><span class="pub-status-badge ${n.cls}">${n.label}</span></td>\n          <td class="pub-actions">\n            ${"running"===t.status?'<button class="pub-act-btn pause">暂停</button>':""}\n            ${"pending"===t.status?'<button class="pub-act-btn start">启动</button>':""}\n            ${"failed"===t.status?'<button class="pub-act-btn retry">重试</button>':""}\n            ${"completed"===t.status?'<button class="pub-act-btn view">查看</button>':""}\n            <button class="pub-act-btn del">删除</button>\n          </td>\n        </tr>`}).join("")}document.querySelectorAll(".pub-tab").forEach(t=>{t.addEventListener("click",function(){document.querySelectorAll(".pub-tab").forEach(t=>t.classList.remove("active")),this.classList.add("active"),currentFilter=this.dataset.filter,renderTable(currentFilter)})});const overlay=document.getElementById("modalOverlay");document.getElementById("newTaskBtn").addEventListener("click",()=>overlay.style.display="flex"),document.getElementById("modalClose").addEventListener("click",()=>overlay.style.display="none"),document.getElementById("modalCancel").addEventListener("click",()=>overlay.style.display="none"),overlay.addEventListener("click",t=>{t.target===overlay&&(overlay.style.display="none")}),renderTable("all")</script></body></html>
